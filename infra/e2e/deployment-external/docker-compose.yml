services:
  sshd:
    build:
      context: ./sshd
    environment:
      E2E_SSH_AUTHORIZED_KEY: ${E2E_SSH_AUTHORIZED_KEY:?Set a disposable SSH public key for the E2E environment}
    ports:
      - "127.0.0.1:2222:22"
    healthcheck:
      test: ["CMD-SHELL", "test -f /home/e2e/.ssh/authorized_keys"]
      interval: 5s
      timeout: 3s
      retries: 12

  jenkins:
    build:
      context: ./jenkins
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    ports:
      - "127.0.0.1:18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/login >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  docker-target:
    image: alpine:3.20
    command: ["sh", "-c", "trap : TERM INT; sleep infinity & wait"]

name: e-ai-brain

services:
  api:
    image: e-ai-brain-api
    container_name: e-ai-brain-api
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    image: e-ai-brain-web
    container_name: e-ai-brain-web
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      UMI_APP_API_BASE_URL: ${UMI_APP_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    container_name: e-ai-brain-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_brain}
      POSTGRES_USER: ${POSTGRES_USER:-ai_brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_brain_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/app/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: e-ai-brain-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:

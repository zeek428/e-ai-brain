name: e-ai-brain

services:
  api:
    image: e-ai-brain-api
    container_name: e-ai-brain-api
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      PERSISTENCE_MODE: postgres
      OBJECT_STORAGE_PROVIDER: minio
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: ai-brain-knowledge
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-ai_brain_minio}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-ai_brain_minio_password}
      OBJECT_STORAGE_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio

  web:
    image: e-ai-brain-web
    container_name: e-ai-brain-web
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
    ports:
      - "5173:5173"
    depends_on:
      - api

  postgres:
    image: ${PGVECTOR_IMAGE:-e-ai-brain-postgres-pgvector:0.8.2-pg18-trixie}
    container_name: e-ai-brain-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_brain}
      POSTGRES_USER: ${POSTGRES_USER:-ai_brain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_brain_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/app/db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: e-ai-brain-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: e-ai-brain-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ai_brain_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ai_brain_minio_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
